<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="pinkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8FB1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D946EF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Pétalos de flor en forma de A -->
  <!-- Pétalo superior izquierdo -->
  <ellipse cx="35" cy="25" rx="12" ry="18" fill="url(#pinkGradient)" transform="rotate(-30 35 25)"/>
  
  <!-- Pétalo superior derecho -->
  <ellipse cx="65" cy="25" rx="12" ry="18" fill="url(#pinkGradient)" transform="rotate(30 65 25)"/>
  
  <!-- Pétalo izquierdo -->
  <ellipse cx="25" cy="50" rx="12" ry="18" fill="url(#pinkGradient)" transform="rotate(-60 25 50)"/>
  
  <!-- Pétalo derecho -->
  <ellipse cx="75" cy="50" rx="12" ry="18" fill="url(#pinkGradient)" transform="rotate(60 75 50)"/>
  
  <!-- Pétalo inferior izquierdo -->
  <ellipse cx="35" cy="75" rx="12" ry="18" fill="url(#pinkGradient)" transform="rotate(-90 35 75)"/>
  
  <!-- Pétalo inferior derecho -->
  <ellipse cx="65" cy="75" rx="12" ry="18" fill="url(#pinkGradient)" transform="rotate(90 65 75)"/>
  
  <!-- Centro de la flor con letra A -->
  <circle cx="50" cy="50" r="20" fill="#FFE4E9"/>
  <text x="50" y="62" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#D946EF" text-anchor="middle">A</text>
</svg>
